<!DOCTYPE html>
<html lang="en">
<head>
    <title>Form</title>
</head>
<body>
<form>
    <div class="fname-section">
        <label for="fname">First Name</label><br>
        <input type="text" id="fname" name="firstname" class="fname-input">
    </div>

    <div class="mname-section">
        <label for="mname">Middle Name</label><br>
        <input type="text" id="mname" name="middlename" class="mname-input">
    </div>

    <div class="lname-section">
        <label for="lname">Last Name</label><br>
        <input type="text" id="lname" name="lastname" class="lname-input">
    </div>

    <div class="father-section">
        <label for="fathername">Father's Name</label><br>
        <input type="text" id="fathername" name="fathername" class="father-input">
    </div>

    <div class="mother-section">
        <label for="mothername">Mother's Name</label><br>
        <input type="text" id="mothername" name="mothername" class="mother-input">
    </div>

    <div class="dob-section">
        <label for="dob">Date of birth</label><br>
        <input type="date" id="dob" name="dob" class="dob-input">
    </div>

    <div class="address-section">
        <label for="address">Address</label><br>
        <input type="text" id="address" name="address" class="address-input">
    </div>

    <div class="contact-section">
        <label for="contact">Contact Number</label><br>
        <input type="number" id="contact" name="contact" class="contact-input">
    </div>

    <div class="submission-section">
        <label for="submissiondate">Date of submission</label><br>
        <input type="date" id="submissiondate" name="submissiondate" class="submission-input">
    </div>

    <div class="getup-section">
        <label for="getuptime">When do you get up?</label><br>
        <input type="time" id="getuptime" name="getuptime" class="getup-input">
    </div>

    <div class="laptop-section">
        <label>Do you have laptop?</label><br>
        <input type="radio" id="laptop-yes" name="laptop" value="yes" class="radio-input"> 
        <label for="laptop-yes">Yes</label>
        
        <input type="radio" id="laptop-no" name="laptop" value="no" class="radio-input"> 
        <label for="laptop-no">No</label>
    </div>

    <div class="phone-section">
        <label>Do you have phone?</label><br>
        <input type="radio" id="phone-yes" name="phone" value="yes" class="radio-input"> 
        <label for="phone-yes">Yes</label>
        
        <input type="radio" id="phone-no" name="phone" value="no" class="radio-input"> 
        <label for="phone-no">No</label>
    </div>

    <div class="marital-section">
        <label>Marital Status</label><br>
        <input type="radio" id="single" name="marital" value="single" class="radio-input"> 
        <label for="single">Single</label>
        
        <input type="radio" id="married" name="marital" value="married" class="radio-input"> 
        <label for="married">Married</label>
    </div>

    <div class="blood-section">
        <label for="bloodgroup">Blood Group</label><br>
        <input type="text" id="bloodgroup" name="bloodgroup" class="blood-input">
    </div>

    <div class="gender-section">
        <label>Gender</label><br>
        <input type="radio" id="male" name="gender" value="male" class="radio-input"> 
        <label for="male">Male</label>
        
        <input type="radio" id="female" name="gender" value="female" class="radio-input"> 
        <label for="female">Female</label>
    </div>
</form>
</body>
</html>
