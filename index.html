<!DOCTYPE html>
<head>
<title>Form</title>
</head>
<body>
<!-- First Name Section -->
<div>
    <label>First Name</label>
    <input type="text" name="firstname">
</div>

<!-- Middle Name Section -->
<div>
    <label>Middle Name</label>
    <input type="text" name="middlename">
</div>

<!-- Last Name Section -->
<div>
    <label>Last Name</label>
    <input type="text" name="lastname">
</div>

<!-- Father's Name Section -->
<div>
    <label>Father's Name</label>
    <input type="text" name="fathername">
</div>

<!-- Mother's Name Section -->
<div>
    <label>Mother's Name</label>
    <input type="text" name="mothername">
</div>

<!-- Date of Birth Section -->
<div>
    <label>Date of birth</label>
    <input type="date" name="dob">
</div>

<!-- Address Section -->
<div>
    <label>Address</label>
    <input type="text" name="address">
</div>

<!-- Contact Number Section -->
<div>
    <label>Contact Number</label>
    <input type="number" name="contact">
</div>

<!-- Date of Submission Section -->
<div>
    <label>Date of submission</label>
    <input type="date" name="submissiondate">
</div>

<!-- When do you get up Section -->
<div>
    <label>When do you get up?</label>
    <input type="time" name="getuptime">
</div>

<!-- Do you have laptop Section -->
<div>
    <label>Do you have laptop?</label>
    <input type="radio" name="laptop" value="yes"> <label>Yes</label>
    <input type="radio" name="laptop" value="no"> <label>No</label>
</div>

<!-- Do you have phone Section -->
<div>
    <label>Do you have phone?</label>
    <input type="radio" name="phone" value="yes"> <label>Yes</label>
    <input type="radio" name="phone" value="no"> <label>No</label>
</div>

<!-- Marital Status Section -->
<div>
    <label>Marital Status</label>
    <input type="radio" name="marital" value="single"> <label>Single</label>
    <input type="radio" name="marital" value="married"> <label>Married</label>
</div>

<!-- Blood Group Section -->
<div>
    <label>Blood Group</label>
    <input type="text" name="bloodgroup">
</div>

<!-- Gender Section -->
<div>
    <label>Gender</label>
    <input type="radio" name="gender" value="male"> <label>Male</label>
    <input type="radio" name="gender" value="female"> <label>Female</label>
</div>
</body>
</html>
